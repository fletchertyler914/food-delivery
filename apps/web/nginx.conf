# Use Docker's embedded DNS so the api hostname is re-resolved at
# runtime. Pairing `resolver` with a variable in `proxy_pass` (instead
# of a static `upstream` block) means the web container survives api
# container restarts that get a new IP — important for Compose, k8s,
# and ECS rolling deploys alike.
resolver 127.0.0.11 valid=10s ipv6=off;

# Strict CSP for HTML/asset responses. The bundle only loads its own
# code and only opens connections back to the same origin (where /api/
# and /socket.io/ are proxied here). MUI/emotion injects styles at
# runtime, so style-src needs 'unsafe-inline'.
map $sent_http_content_type $security_csp {
  # `img-src` allows https + data so that demo cover imagery served from
  # a CDN (e.g. images.unsplash.com) renders without falling back to the
  # gradient placeholder. The set is still locked down: no scripts,
  # no framing, no third-party connections.
  default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  absolute_redirect off;
  port_in_redirect off;

  # gzip for text-shaped payloads. Hashed JS/CSS bundles get the
  # biggest win here; binary types are excluded by the default config
  # because their compression ratios don't justify the CPU cost.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/xml
    application/atom+xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf;

  # Variable + resolver pattern forces per-request DNS lookup.
  set $api_host "api:3000";

  # Container-local liveness probe. Stays inside the web tier so the
  # Docker HEALTHCHECK does not depend on the API being reachable —
  # the SPA fallback can still serve traffic if the API is briefly
  # unavailable.
  location = /healthz {
    access_log off;
    add_header Content-Type "text/plain" always;
    return 200 "ok\n";
  }

  # API process probes are also available through the same front door
  # for operators and smoke checks. The API serves these outside the
  # `/api` global prefix, so nginx proxies them explicitly.
  location = /health/live {
    access_log off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://$api_host/health/live;
  }

  location = /health/ready {
    access_log off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://$api_host/health/ready;
  }

  # REST API: forwarded with the /api/ prefix intact so the Nest
  # global prefix and versioning continue to match.
  location /api/ {
    client_max_body_size 1m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_host$request_uri;
  }

  # Socket.IO transport. The app connects to namespace /realtime, but
  # transport-level traffic always goes through /socket.io/.
  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_pass http://$api_host$request_uri;
  }

  # OpenAPI / Swagger UI served by the API for compose parity.
  location = /docs {
    return 302 /docs/;
  }

  location /docs/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_host/docs/;
  }

  location = /docs-json {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://$api_host/docs-json;
  }

  # Hashed Vite build assets are immutable; cache them aggressively.
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $security_csp always;
    try_files $uri =404;
  }

  # Never cache the entry HTML so deploys roll out immediately.
  location = /index.html {
    add_header Cache-Control "no-store" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $security_csp always;
  }

  # SPA fallback so deep links and hard refresh hit the React shell
  # and the client router can decide what to render.
  location / {
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy $security_csp always;
    try_files $uri $uri/ /index.html;
  }
}
