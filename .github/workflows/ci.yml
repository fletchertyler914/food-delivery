name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_ACCESS_SECRET: ci-test-jwt-secret-at-least-32-chars-long
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL_DAYS: "30"
  WEB_ORIGIN: http://localhost:5173
  API_PORT: "3000"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @food-delivery/api generate
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm typecheck

  format:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm format:check

  audit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm audit --audit-level=high

  openapi-drift:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm generate
      - run: git diff --exit-code -- packages/api-client/openapi.json packages/api-client/src/generated/schema.ts

  unit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm test:unit

  coverage:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm --filter @food-delivery/api exec vitest run --config vitest.unit.config.ts --coverage
      - run: pnpm --filter @food-delivery/web exec vitest run --passWithNoTests --coverage

  integration:
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm test:integration

  e2e:
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm test:e2e

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
            packages/api-client/node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - run: pnpm build
