services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: food_delivery
      POSTGRES_PASSWORD: food_delivery
      POSTGRES_DB: food_delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_delivery -d food_delivery"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
